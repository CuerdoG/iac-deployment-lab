---
# ============================================================
# INSTALAR DOCKER EN TODAS LAS MAQUINAS
# ============================================================
- name: Instalar Docker
  hosts: all
  become: yes
  tasks:

    - name: Instalar dependencias base
      ansible.builtin.apt:
        name:
          - gnupg
          - ca-certificates
          - curl
          - rsync
        state: present
        update_cache: yes

    - name: Eliminar paquetes Docker conflictivos
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
          - docker-buildx
          - containerd
          - runc
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Crear directorio para claves APT
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Descargar clave GPG de Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Añadir repositorio de Docker
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable"
        state: present

    - name: Instalar Docker CE y Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Arrancar y habilitar Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

# ============================================================
# DESPLEGAR MARIADB
# ============================================================
- name: Desplegar MariaDB
  hosts: mariadb
  become: yes
  tasks:

    - name: Parar contenedores y eliminar volúmenes previos
      ansible.builtin.shell: docker compose down -v
      args:
        chdir: /opt/databases
      ignore_errors: yes

    - name: Eliminar wp-db-data para forzar reimportación del backup
      ansible.builtin.file:
        path: /opt/databases/wp-db-data
        state: absent

    - name: Crear directorios
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/databases
        - /opt/databases/wp-db-data
        - /opt/databases/zabbix-db-data

    - name: Copiar backup.sql
      ansible.builtin.copy:
        src: /root/git/iac-deployment-lab/wordpress-docker-proyecto/backup.sql
        dest: /opt/databases/backup.sql
        mode: '0644'

    - name: Escribir docker-compose.yml de MariaDB
      ansible.builtin.copy:
        dest: /opt/databases/docker-compose.yml
        content: |
          services:
            wp_db:
              image: mariadb:10.11
              container_name: wp_db
              restart: always
              ports:
                - "3306:3306"
              environment:
                MYSQL_DATABASE: wordpress
                MYSQL_USER: wpuser
                MYSQL_PASSWORD: wppass
                MYSQL_ROOT_PASSWORD: rootpass
              volumes:
                - ./wp-db-data:/var/lib/mysql
                - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql

            zabbix_db:
              image: mariadb:10.11
              container_name: zabbix_db
              restart: always
              ports:
                - "3307:3306"
              environment:
                MYSQL_DATABASE: zabbix
                MYSQL_USER: zabbix
                MYSQL_PASSWORD: zabbixpass
                MYSQL_ROOT_PASSWORD: rootpass
              volumes:
                - ./zabbix-db-data:/var/lib/mysql

    - name: Levantar MariaDB
      ansible.builtin.shell: docker compose up -d
      args:
        chdir: /opt/databases

    - name: Esperar a que MariaDB arranque
      ansible.builtin.wait_for:
        timeout: 30

    - name: Dar permisos a wpuser desde cualquier host
      ansible.builtin.shell: >
        docker exec wp_db mysql -u root -prootpass -e
        "GRANT ALL ON wordpress.* TO 'wpuser'@'%' IDENTIFIED BY 'wppass'; FLUSH PRIVILEGES;"

    - name: Dar permisos a zabbix desde cualquier host
      ansible.builtin.shell: >
        docker exec zabbix_db mysql -u root -prootpass -e
        "GRANT ALL ON zabbix.* TO 'zabbix'@'%' IDENTIFIED BY 'zabbixpass'; FLUSH PRIVILEGES;"

# ============================================================
# DESPLEGAR WORDPRESS
# ============================================================
- name: Desplegar WordPress
  hosts: wordpress
  become: yes
  tasks:

    - name: Instalar git
      ansible.builtin.apt:
        name: git
        state: present

    - name: Parar contenedores previos
      ansible.builtin.shell: docker compose down --remove-orphans
      args:
        chdir: /opt/wordpress
      ignore_errors: yes

    - name: Borrar directorio WordPress para clonar limpio
      ansible.builtin.file:
        path: /opt/wordpress
        state: absent

    - name: Clonar repositorio
      ansible.builtin.git:
        repo: https://github.com/CuerdoG/wordpress-docker-proyecto.git
        dest: /opt/wordpress
        force: yes

    - name: Crear directorio wp-data con permisos www-data
      ansible.builtin.file:
        path: /opt/wordpress/wp-data
        state: directory
        owner: '33'
        group: '33'
        mode: '0775'
        recurse: yes

    - name: Escribir docker-compose.yml de WordPress
      ansible.builtin.copy:
        dest: /opt/wordpress/docker-compose.yml
        content: |
          services:
            wordpress:
              image: wordpress:php8.2-apache
              container_name: wp_web
              restart: always
              ports:
                - "80:80"
              environment:
                WORDPRESS_DB_HOST: 10.0.40.204:3306
                WORDPRESS_DB_USER: wpuser
                WORDPRESS_DB_PASSWORD: wppass
                WORDPRESS_DB_NAME: wordpress
                WORDPRESS_CONFIG_EXTRA: |
                  $$table_prefix = 'inmo_';
                  define('WP_HOME', 'https://zitadel.a24iriabc.iesteis.gal');
                  define('WP_SITEURL', 'https://zitadel.a24iriabc.iesteis.gal');
                  if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
                      $$_SERVER['HTTPS'] = 'on';
                  }
              volumes:
                - ./wp-data:/var/www/html

    - name: Levantar WordPress
      ansible.builtin.shell: docker compose up -d --force-recreate
      args:
        chdir: /opt/wordpress

    - name: Esperar a que WordPress arranque
      ansible.builtin.wait_for:
        port: 80
        host: 127.0.0.1
        timeout: 60

    - name: Activar módulos Apache necesarios
      ansible.builtin.shell: |
        docker exec wp_web a2enmod rewrite headers
        docker exec wp_web apache2ctl graceful


# ============================================================
# DESPLEGAR ZABBIX
# ============================================================
- name: Desplegar Zabbix
  hosts: zabbix
  become: yes
  tasks:

    - name: Crear directorios de Zabbix
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /opt/zabbix
        - /opt/zabbix/zbx-data

    - name: Escribir docker-compose.yml de Zabbix
      ansible.builtin.copy:
        dest: /opt/zabbix/docker-compose.yml
        content: |
          services:
            zabbix-server:
              image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
              container_name: zabbix_server
              restart: always
              ports:
                - "10051:10051"
              environment:
                DB_SERVER_HOST: 10.0.40.204
                DB_SERVER_PORT: 3307
                MYSQL_DATABASE: zabbix
                MYSQL_USER: zabbix
                MYSQL_PASSWORD: zabbixpass
                MYSQL_ROOT_PASSWORD: rootpass
              volumes:
                - ./zbx-data:/var/lib/zabbix

            zabbix-web:
              image: zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest
              container_name: zabbix_web
              restart: always
              depends_on:
                - zabbix-server
              ports:
                - "80:8080"
              environment:
                ZBX_SERVER_HOST: zabbix-server
                DB_SERVER_HOST: 10.0.40.204
                DB_SERVER_PORT: 3307
                MYSQL_DATABASE: zabbix
                MYSQL_USER: zabbix
                MYSQL_PASSWORD: zabbixpass
                PHP_TZ: Europe/Madrid

            zabbix-agent:
              image: zabbix/zabbix-agent2:ubuntu-7.0-latest
              container_name: zabbix_agent
              restart: always
              environment:
                ZBX_HOSTNAME: zabbix-server
                ZBX_SERVER_HOST: zabbix-server
              network_mode: host
              privileged: true

    - name: Parar Zabbix si estaba corriendo
      ansible.builtin.shell: docker compose down
      args:
        chdir: /opt/zabbix
      ignore_errors: yes

    - name: Levantar Zabbix
      ansible.builtin.shell: docker compose up -d
      args:
        chdir: /opt/zabbix

    - name: Esperar a que Zabbix inicialice
      ansible.builtin.wait_for:
        timeout: 60

    - name: Reiniciar zabbix-server para asegurar conexión a BD
      ansible.builtin.shell: docker restart zabbix_server

# ============================================================
# DESPLEGAR TRAEFIK
# ============================================================
- name: Desplegar Traefik
  hosts: traefik
  become: yes
  tasks:

    - name: Crear directorio de Traefik
      ansible.builtin.file:
        path: /opt/traefik
        state: directory
        mode: '0755'

    - name: Crear acme.json con permisos correctos
      ansible.builtin.file:
        path: /opt/traefik/acme.json
        state: touch
        mode: '0600'

    - name: Escribir traefik.yml
      ansible.builtin.copy:
        dest: /opt/traefik/traefik.yml
        content: |
          entryPoints:
            web:
              address: ":80"
              http:
                redirections:
                  entryPoint:
                    to: websecure
                    scheme: https
            websecure:
              address: ":443"

          certificatesResolvers:
            letsencrypt:
              acme:
                email: admin@zitadel.es
                storage: /letsencrypt/acme.json
                httpChallenge:
                  entryPoint: web

          providers:
            file:
              filename: /etc/traefik/dynamic.yml

    - name: Escribir dynamic.yml
      ansible.builtin.copy:
        dest: /opt/traefik/dynamic.yml
        content: |
          http:
            routers:
              wordpress:
                rule: "Host(`zitadel.a24iriabc.iesteis.gal`)"
                entryPoints:
                  - websecure
                service: wordpress
                tls:
                  certResolver: letsencrypt

            services:
              wordpress:
                loadBalancer:
                  servers:
                    - url: "http://10.0.30.203:80"

    - name: Escribir docker-compose.yml de Traefik
      ansible.builtin.copy:
        dest: /opt/traefik/docker-compose.yml
        content: |
          services:
            traefik:
              image: traefik:v3.0
              container_name: traefik
              restart: always
              ports:
                - "80:80"
                - "443:443"
              volumes:
                - ./traefik.yml:/traefik.yml:ro
                - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
                - ./acme.json:/letsencrypt/acme.json

    - name: Parar Traefik si estaba corriendo
      ansible.builtin.shell: docker compose down
      args:
        chdir: /opt/traefik
      ignore_errors: yes

    - name: Levantar Traefik
      ansible.builtin.shell: docker compose up -d
      args:
        chdir: /opt/traefik
