---
# 1. PREPARACIÓN EN EL NODO CENTRAL (localhost)
- name: Preparar archivos en el Nodo Central
  hosts: localhost
  tasks:
    - name: Descargar el repositorio de GitHub en el controlador
      git:
        repo: https://github.com/CuerdoG/wordpress-docker-proyecto.git
        dest: /root/infraestructura/ansible/repo_proyecto/
        force: yes

    - name: Instalar rsync en localhost
      apt:
        name: rsync
        state: present

# 2. INSTALACIÓN DE DOCKER EN TODAS LAS MVs
- name: Instalar Docker en todas las MVs
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Instalar dependencias
      apt:
        name:
          - gnupg
          - gnupg2
          - software-properties-common
          - ca-certificates
          - curl
        state: present
        update_cache: yes

    - name: Añadir clave GPG de Docker
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        state: present

    - name: Añadir repositorio de Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/debian bookworm stable"
        state: present

    - name: Instalar Docker Engine y Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Arrancar Docker
      service:
        name: docker
        state: started
        enabled: yes

# 3. DESPLEGAR MARIADB
- name: Desplegar bases de datos (WordPress + Zabbix)
  hosts: mariadb
  become: yes
  tasks:
    - name: Detener contenedores previos
      shell: docker compose down -v
      args:
        chdir: /opt/databases
      ignore_errors: yes

    - name: Eliminar wp-db-data para forzar reimportación del backup
      file:
        path: /opt/databases/wp-db-data
        state: absent

    - name: Crear directorios de datos
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/databases
        - /opt/databases/wp-db-data
        - /opt/databases/zabbix-db-data

    - name: Copiar backup.sql desde el Nodo Central
      copy:
        src: /root/infraestructura/ansible/repo_proyecto/backup.sql
        dest: /opt/databases/backup.sql
        mode: "0644"

    - name: Escribir docker-compose.yml
      copy:
        dest: /opt/databases/docker-compose.yml
        content: |
          services:
            wp_db:
              image: mariadb:10.11
              container_name: wp_db
              restart: always
              ports:
                - "3306:3306"
              environment:
                MYSQL_DATABASE: wordpress
                MYSQL_USER: wpuser
                MYSQL_PASSWORD: wppass
                MYSQL_ROOT_PASSWORD: rootpass
              volumes:
                - ./wp-db-data:/var/lib/mysql
                - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql

            zabbix_db:
              image: mariadb:10.11
              container_name: zabbix_db
              restart: always
              ports:
                - "3307:3306"
              environment:
                MYSQL_DATABASE: zabbix
                MYSQL_USER: zabbix
                MYSQL_PASSWORD: zabbixpass
                MYSQL_ROOT_PASSWORD: rootpass
              volumes:
                - ./zabbix-db-data:/var/lib/mysql

    - name: Levantar bases de datos
      shell: docker compose up -d
      args:
        chdir: /opt/databases

    - name: Esperar a que MariaDB inicialice (30s)
      wait_for:
        timeout: 30

    - name: Verificar permisos wpuser en MariaDB
      shell: >
        docker exec wp_db mysql -u root -prootpass -e
        "GRANT ALL ON wordpress.* TO 'wpuser'@'%' IDENTIFIED BY 'wppass'; FLUSH PRIVILEGES;"

# 4. DESPLEGAR WORDPRESS
- name: Desplegar WordPress
  hosts: wordpress
  become: yes
  tasks:
    - name: Asegurar directorios de la aplicación
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/wordpress
        - /opt/wordpress/wp-data

    - name: Sincronizar archivos del repo (excluyendo wp-data)
      synchronize:
        src: /root/infraestructura/ansible/repo_proyecto/
        dest: /opt/wordpress/
        recursive: yes
        delete: yes
        rsync_opts:
          - "--exclude=wp-data/"

    - name: Detener contenedores previos completamente
      shell: docker compose down --remove-orphans
      args:
        chdir: /opt/wordpress
      ignore_errors: yes

    - name: Limpiar wp-config.php previo
      file:
        path: /opt/wordpress/wp-data/wp-config.php
        state: absent

    - name: Forzar permisos para UID 33 (www-data)
      file:
        path: /opt/wordpress/wp-data
        state: directory
        owner: "33"
        group: "33"
        mode: '0775'
        recurse: yes

    - name: Generar docker-compose.yml con configuración inyectada
      copy:
        dest: /opt/wordpress/docker-compose.yml
        content: |
          services:
            wordpress:
              image: wordpress:php8.2-apache
              container_name: wp_web
              restart: always
              ports:
                - "80:80"
                - "443:443"
              environment:
                WORDPRESS_DB_HOST: 10.0.40.204
                WORDPRESS_DB_USER: wpuser
                WORDPRESS_DB_PASSWORD: wppass
                WORDPRESS_DB_NAME: wordpress
                WORDPRESS_CONFIG_EXTRA: |
                  $$table_prefix = 'inmo_';
                  define('WP_HOME', 'https://zitadel.a24iriabc.iesteis.gal');
                  define('WP_SITEURL', 'https://zitadel.a24iriabc.iesteis.gal');
                  if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
                      $$_SERVER['HTTPS'] = 'on';
                  }
              volumes:
                - ./wp-data:/var/www/html
                - ./apache2/000-default-ssl.conf:/etc/apache2/sites-available/000-default-ssl.conf
                - ./apache2/certs:/etc/apache2/ssl

    - name: Lanzar WordPress
      shell: docker compose up -d --force-recreate
      args:
        chdir: /opt/wordpress

    - name: Esperar a que WordPress genere wp-config.php
      wait_for:
        path: /opt/wordpress/wp-data/wp-config.php
        state: present
        timeout: 60

    - name: Activar módulos SSL y configuración de Apache
      shell: |
        docker exec wp_web a2enmod ssl rewrite headers
        docker exec wp_web a2ensite 000-default-ssl
        docker exec wp_web apache2ctl graceful
      args:
        chdir: /opt/wordpress

# 5. DESPLEGAR ZABBIX
- name: Desplegar Zabbix
  hosts: zabbix
  become: yes
  tasks:
    - name: Crear directorios Zabbix
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/zabbix
        - /opt/zabbix/zbx-data

    - name: Escribir docker-compose.yml de Zabbix
      copy:
        dest: /opt/zabbix/docker-compose.yml
        content: |
          services:
            zabbix-server:
              image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
              container_name: zabbix_server
              restart: always
              ports:
                - "10051:10051"
              environment:
                DB_SERVER_HOST: 10.0.40.204
                DB_SERVER_PORT: 3307
                MYSQL_DATABASE: zabbix
                MYSQL_USER: zabbix
                MYSQL_PASSWORD: zabbixpass
                MYSQL_ROOT_PASSWORD: rootpass
              volumes:
                - ./zbx-data:/var/lib/zabbix

            zabbix-web:
              image: zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest
              container_name: zabbix_web
              restart: always
              depends_on:
                - zabbix-server
              ports:
                - "80:8080"
                - "443:8443"
              environment:
                ZBX_SERVER_HOST: zabbix-server
                DB_SERVER_HOST: 10.0.40.204
                DB_SERVER_PORT: 3307
                MYSQL_DATABASE: zabbix
                MYSQL_USER: zabbix
                MYSQL_PASSWORD: zabbixpass
                PHP_TZ: Europe/Madrid

            zabbix-agent:
              image: zabbix/zabbix-agent2:ubuntu-7.0-latest
              container_name: zabbix_agent
              restart: always
              environment:
                ZBX_HOSTNAME: zabbix-server
                ZBX_SERVER_HOST: zabbix-server
              network_mode: host
              privileged: true

    - name: Levantar Zabbix
      shell: docker compose up -d
      args:
        chdir: /opt/zabbix